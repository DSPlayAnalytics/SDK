# NOTA DE MIGRAÇÃO VPS (Fase 2):
# Ao mover de /opt/portifolio (danpqdan/portifolio) para /opt/dsplay
# (danpqdan/dsplay), os volumes Docker mudam de prefixo:
#
#   portifolio_influxdb_data   → dsplay_influxdb_data
#   portifolio_influxdb_config → dsplay_influxdb_config
#   portifolio_postgres_data   → dsplay_postgres_data
#   portifolio_backend_keys    → dsplay_backend_keys
#
# Copiar antes de subir os novos containers:
#   for vol in influxdb_data influxdb_config postgres_data backend_keys; do
#     docker volume create dsplay_${vol}
#     docker run --rm \
#       -v portifolio_${vol}:/from \
#       -v dsplay_${vol}:/to \
#       alpine sh -c "cp -av /from/. /to/"
#   done
#
# A rede `dsplay_default` é criada automaticamente na primeira subida.
# Após copiar os volumes e subir a nova stack, atualizar monitoring e
# crowdsec (que referenciam dsplay_default como external network) e
# reiniciá-los: make -f ark/Makefile monitoring-up && crowdsec-up

services:
  influxdb:
    image: influxdb:2.7
    container_name: dsplay-influxdb
    ports:
      - "127.0.0.1:8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD:?defina em .env}
      DOCKER_INFLUXDB_INIT_ORG: zen
      DOCKER_INFLUXDB_INIT_BUCKET: portifolio_prod
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:?defina em .env}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 1g
    mem_reservation: 512m
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: dsplay-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portifolio_auth}
      POSTGRES_USER: ${POSTGRES_USER:-portifolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina em .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portifolio} -d ${POSTGRES_DB:-portifolio_auth}"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 512m
    mem_reservation: 256m
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dsplay-redis
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 64m
    mem_reservation: 32m
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: dsplay-backend
    depends_on:
      influxdb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_keys:/app/data/keys
      - ./ark/monitoring/dashboards:/app/dashboards:ro
    environment:
      DASHBOARDS_TEMPLATE_DIR: /app/dashboards
      REDIS_URL: redis://redis:6379
    mem_limit: 768m
    mem_reservation: 384m
    restart: unless-stopped

  frontend:
    build:
      context: ./portifolio/frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        VITE_WEBSOCKET_URL: ${VITE_WEBSOCKET_URL:-http://localhost:5000}
        VITE_DEBUG: ${VITE_DEBUG:-false}
        VITE_PUBLISHABLE_KEY: ${VITE_PUBLISHABLE_KEY:-}
      secrets:
        - NODE_AUTH_TOKEN
    container_name: dsplay-frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:80"
    mem_limit: 128m
    mem_reservation: 64m
    restart: unless-stopped

  archiver:
    build:
      context: ./backend
      dockerfile: archiver/Dockerfile
    container_name: dsplay-archiver
    profiles:
      - archiver
    depends_on:
      influxdb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    mem_limit: 512m
    mem_reservation: 128m
    restart: unless-stopped

  email-cron:
    build:
      context: ./backend
      dockerfile: archiver/Dockerfile
    container_name: dsplay-email-cron
    profiles:
      - email-cron
    command: ["python", "-m", "scripts.email_cron_main"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    mem_limit: 256m
    mem_reservation: 64m
    restart: unless-stopped

  landing:
    build:
      context: ./landing
      args:
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://dsplayground.com.br}
        PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.dsplayground.com.br}
        PUBLIC_PUBLISHABLE_KEY: ${PUBLIC_PUBLISHABLE_KEY:-}
        PUBLIC_DEBUG: ${PUBLIC_DEBUG:-false}
      secrets:
        - NODE_AUTH_TOKEN
    container_name: dsplay-landing
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3002:80"
    mem_limit: 128m
    mem_reservation: 64m
    restart: unless-stopped

secrets:
  NODE_AUTH_TOKEN:
    environment: NODE_AUTH_TOKEN

volumes:
  influxdb_data:
  influxdb_config:
  postgres_data:
  backend_keys:
