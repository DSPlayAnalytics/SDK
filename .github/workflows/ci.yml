name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'portifolio/frontend/**'
      - 'landing/**'
      - 'docker-compose.yml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-config:
    name: docker-compose.yml valido
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - name: Resolver variaveis dummy e validar
        run: |
          cat > .env <<'EOF'
          INFLUXDB_INIT_PASSWORD=ci-dummy
          INFLUXDB_TOKEN=ci-dummy
          SECRET_KEY=ci-dummy
          ADMIN_API_TOKEN=ci-dummy
          POSTGRES_PASSWORD=ci-dummy
          EOF
          touch backend/.env
          docker compose config --quiet

  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Install
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check backend/
      - name: Test
        run: SECRET_KEY=test pytest backend/ -q

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portifolio/frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: portifolio/frontend/package-lock.json
      - name: Install
        run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  frontend-docker:
    name: Frontend (docker build multi-stage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - name: Build da imagem frontend (args dummy)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v6
        with:
          context: ./portifolio/frontend
          push: false
          load: false
          build-args: |
            VITE_API_URL=http://ci-dummy:5000
            VITE_WEBSOCKET_URL=http://ci-dummy:5000
            VITE_DEBUG=false
          secrets: |
            NODE_AUTH_TOKEN=${{ secrets.NPM_AUTH_TOKEN }}
