name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@dsplayground-analytics'

      - name: Install
        run: npm ci

      - name: Test + build
        run: |
          npm run test
          npm run build

      - name: Publish no npmjs.com
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Criar GitHub Release com bundle UMD anexado
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF##*/}"
          gh release view "$tag" >/dev/null 2>&1 \
            || gh release create "$tag" --title "$tag" --notes "Ver CHANGELOG.md"
          gh release upload "$tag" dist/sdk.umd.js dist/sdk.umd.js.map --clobber
