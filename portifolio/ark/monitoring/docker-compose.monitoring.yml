services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: portifolio-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      # Loopback: UI do Prometheus nao e exposta publicamente. Scrape interno
      # via rede portifolio-monitoring/portifolio-app funciona sem depender
      # da porta publicada. Se precisar de UI externa, criar vhost Nginx.
      - "127.0.0.1:9090:9090"
    depends_on:
      - alertmanager
    networks:
      - portifolio-monitoring
      - portifolio-app

  alertmanager:
    image: prom/alertmanager:v0.32.1
    container_name: portifolio-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.listen-address=:9093
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      # `slack_webhook.url` contem a webhook URL do Slack — gerado pelo
      # Ansible role `monitoring` a partir do vault `slack_webhook_alerts`.
      # Gitignored. Se nao existir, alertmanager nao sobe — bind mount de
      # path ausente vira diretorio. Ver README.
      - ./alertmanager/slack_webhook.url:/etc/alertmanager/slack_webhook.url:ro
      - alertmanager-data:/alertmanager
    ports:
      # Loopback so. UI publica vazaria info de quem recebe alertas.
      - "127.0.0.1:9093:9093"
    networks:
      - portifolio-monitoring

  grafana:
    image: grafana/grafana:11.6.14
    container_name: portifolio-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Substituicao no datasource provisionado (datasources.yml).
      # Tem que casar com o token e bucket do container influxdb.
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-dev-local-influxdb-token}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-zen}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-portifolio_prod}
      # ------ Dashboard self-service do cliente ------
      # Ver ark/docs/dashboard-cliente.md. Grafana serve sob subpath
      # /cliente/metricas/ e confia no header X-WEBAUTH-USER injetado
      # pelo nginx apos validacao do cookie pelo backend Flask.
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL:-https://app.dsplayground.com.br/cliente/metricas/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: X-WEBAUTH-USER
      GF_AUTH_PROXY_HEADER_PROPERTY: username
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_HEADERS: "Role:X-WEBAUTH-PAPEL"
      GF_AUTH_PROXY_WHITELIST: "127.0.0.1, ::1, 172.16.0.0/12, 10.0.0.0/8"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
      # ------ Hardening Viewer (impede edicao de query/painel ate na sessao) ------
      # Default do Grafana e permitir Viewer editar painel em-memoria. Sem isso,
      # cliente abre dashboard provisionado, troca a query (ou usa Explore) e ve
      # bucket/measurement de outro tenant. Tres travas:
      #   1) Viewer NUNCA edita painel, nem na sessao;
      #   2) Aba Explore desligada (queries arbitrarias proibidas);
      #   3) Snapshots externos desligados (evita exfiltrar dado por URL publica).
      GF_USERS_VIEWERS_CAN_EDIT: "false"
      GF_EXPLORE_ENABLED: "false"
      GF_SNAPSHOTS_EXTERNAL_ENABLED: "false"
      # Admin ainda consegue acessar login form em /cliente/metricas/login
      # quando o header nao esta presente (fluxo administrativo).
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      # Acesso publico via nginx → grafana.dsplayground.com.br. Sem bypass direto.
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    networks:
      - portifolio-monitoring
      - portifolio-app

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: portifolio-node-exporter
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      # Loopback: Prometheus alcanca via rede portifolio-monitoring (hostname
      # node-exporter:9100), nao precisa exposicao publica.
      - "127.0.0.1:9100:9100"
    networks:
      - portifolio-monitoring

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:

networks:
  portifolio-monitoring:
    driver: bridge
  portifolio-app:
    external: true
    name: portifolio_default
