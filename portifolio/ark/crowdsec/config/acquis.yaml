---
# Logs do backend analytics (formato estruturado `evento=... session_id=...`)
filenames:
  - /var/log/backend/security.log
labels:
  type: portifolio-backend
---
# Logs do Nginx (acesso e erro)
filenames:
  - /var/log/nginx/portifolio.access.log
labels:
  type: nginx
---
filenames:
  - /var/log/nginx/portifolio.error.log
labels:
  type: nginx-error
---
# Logs do vhost da API (api.dsplayground.com.br)
filenames:
  - /var/log/nginx/portifolio.api.access.log
labels:
  type: nginx
---
filenames:
  - /var/log/nginx/portifolio.api.error.log
labels:
  type: nginx-error
---
# Logs do vhost do frontend
filenames:
  - /var/log/nginx/portifolio.frontend.access.log
labels:
  type: nginx
---
filenames:
  - /var/log/nginx/portifolio.frontend.error.log
labels:
  type: nginx-error
