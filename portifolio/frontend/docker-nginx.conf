# Servido dentro do container portifolio-frontend (nginx:alpine).
# O Nginx do host faz proxy para 127.0.0.1:3000, que mapeia para esta porta 80.

server {
    listen 80;
    listen [::]:80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/frontend.access.log;
    error_log  /var/log/nginx/frontend.error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;

    # Estaticos com hash no nome — cache longo, imutavel.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Demais estaticos — cache curto.
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # SPA fallback: qualquer rota nao-estatica serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck interno (usado pelo compose healthcheck se configurado).
    location = /_health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
