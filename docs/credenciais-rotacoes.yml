# Estado de rotacao das credenciais. Lido pelo workflow GHA
# .github/workflows/credenciais-rotacao-reminder.yml todo dia 1 do mes
# 09:00 UTC. Atualiza `last_rotated` quando rotacionar (manualmente).
#
# Procedimento de cada credencial em ark/docs/credenciais-cadence.md.
#
# Formato:
#   - name: NOME
#     cadence_days: int        # cadencia em dias
#     last_rotated: YYYY-MM-DD # ou null se nunca rotacionada
#     critical: true|false     # se true, issue tem label P0
---
- name: ADMIN_API_TOKEN
  cadence_days: 30
  last_rotated: null
  critical: true

- name: INFLUXDB_TOKEN
  cadence_days: 90
  last_rotated: null
  critical: true

- name: POSTGRES_PASSWORD
  cadence_days: 180
