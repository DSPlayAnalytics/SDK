name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read  # npm ci precisa baixar @danpqdan/* do GitHub Packages

jobs:
  test:
    name: check + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v4
        with:
          node-version: '20'
          cache: npm
      - name: Install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: npm ci
      - run: npm run check
      - run: npm run test
      - run: npm run build

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - name: Build da imagem (args dummy)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v6
        with:
          context: .
          push: false
          load: false
          build-args: |
            PUBLIC_SITE_URL=https://ci-dummy.example.com
            PUBLIC_API_URL=http://ci-dummy:5000
            PUBLIC_DEBUG=false
          secrets: |
            NODE_AUTH_TOKEN=${{ secrets.NPM_AUTH_TOKEN }}
