name: Credenciais — reminder de rotacao

# Roda dia 1 de cada mes 09:00 UTC. Le docs/credenciais-rotacoes.yml,
# calcula next_due e abre issue se today >= next_due - 7d.
# Procedimento de cada credencial: docs/credenciais-cadence.md.

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - name: Verificar credenciais vencidas / proximas a vencer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import yaml, datetime, json, os, urllib.request, urllib.error

          today = datetime.date.today()
          with open('docs/credenciais-rotacoes.yml') as f:
              creds = yaml.safe_load(f)

          due = []
          for c in creds:
              cadence = datetime.timedelta(days=c['cadence_days'])
              if c['last_rotated']:
                  last = c['last_rotated']
                  if isinstance(last, str):
                      last = datetime.date.fromisoformat(last)
                  next_due = last + cadence
              else:
                  next_due = today
              days = (next_due - today).days
              if days <= 7:
                  due.append({
                      'name': c['name'],
                      'days_until': days,
                      'critical': c.get('critical', False),
                      'next_due': next_due.isoformat(),
                  })

          if not due:
              print('Nenhuma credencial vencendo nos proximos 7d.')
              raise SystemExit(0)

          lines = [
              '## Rotacoes de credenciais pendentes',
              '',
              'Procedimento em [docs/credenciais-cadence.md](../tree/main/docs/credenciais-cadence.md).',
              '',
              '| Credencial | Status | Vence | Critica |',
              '|---|---|---|---|',
          ]
          for d in due:
              status = 'NUNCA rotacionada' if d['days_until'] < -360 else (
                  'VENCIDA' if d['days_until'] < 0 else f"em {d['days_until']}d"
              )
              critical = 'sim' if d['critical'] else '-'
              lines.append(f"| `{d['name']}` | {status} | {d['next_due']} | {critical} |")
          lines.append('')
          lines.append('Apos rotacionar, atualizar `last_rotated` em `docs/credenciais-rotacoes.yml` e fechar a issue.')

          body = '\n'.join(lines)
          critical_count = sum(1 for d in due if d['critical'])
          title = f"[ROTACAO] {len(due)} credencial(is) pendente(s)"
          if critical_count:
              title += f" ({critical_count} critica(s))"

          headers = {
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          # Deduplica: se ja existe issue aberta com label rotacao-credenciais,
          # atualiza o corpo em vez de abrir nova.
          repo = os.environ['REPO']
          search_url = (
              f"https://api.github.com/repos/{repo}/issues"
              "?state=open&labels=rotacao-credenciais&per_page=1"
          )
          with urllib.request.urlopen(
              urllib.request.Request(search_url, headers=headers)
          ) as resp:
              open_issues = json.load(resp)

          if open_issues:
              existing = open_issues[0]
              patch_body = json.dumps({'title': title, 'body': body}).encode()
              patch_req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/issues/{existing['number']}",
                  data=patch_body,
                  headers={**headers, 'Content-Type': 'application/json'},
                  method='PATCH',
              )
              with urllib.request.urlopen(patch_req) as resp:
                  out = json.load(resp)
              print(f"Issue #{out['number']} atualizada (ja existia aberta): {out['html_url']}")
          else:
              req_body = json.dumps({
                  'title': title,
                  'body': body,
                  'labels': ['security', 'rotacao-credenciais'] + (['P0'] if critical_count else ['P2']),
              }).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/issues",
                  data=req_body,
                  headers={**headers, 'Content-Type': 'application/json'},
                  method='POST',
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      out = json.load(resp)
                      print(f"Issue #{out['number']} criada: {out['html_url']}")
              except urllib.error.HTTPError as e:
                  print(f"Erro {e.code}: {e.read().decode()}")
                  raise
          PY
