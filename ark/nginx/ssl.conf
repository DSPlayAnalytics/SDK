# Hardening TLS compartilhado entre vhosts.
# Reforco conservador: TLS 1.2 e 1.3 apenas, ciphers modernos, OCSP stapling.

ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
ssl_prefer_server_ciphers on;

ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# HSTS: 6 meses + includeSubDomains. `preload` deixado fora ate todos os
# subdominios atuais e futuros estarem 100% HTTPS — submissao a
# https://hstspreload.org e irreversivel sem espera de propagacao.
add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

add_header X-Content-Type-Options    "nosniff"                          always;
add_header X-Frame-Options           "SAMEORIGIN"                       always;
add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
# Permissions-Policy (ex Feature-Policy): nega APIs sensiveis por default.
# Vhosts especificos podem re-emitir se precisarem.
add_header Permissions-Policy        "microphone=(), camera=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
# Esconde Server / X-Powered-By dos upstreams (Flask/Werkzeug/Grafana/Influx).
proxy_hide_header X-Powered-By;
proxy_hide_header Server;
