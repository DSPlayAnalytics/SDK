# vhost monitoring — grafana.* e influx.*
#
# Ambos atras da Cloudflare (proxy ON), cert Origin da Cloudflare.
# Upstream em 127.0.0.1 — as portas 3001 e 8086 sao trancadas em
# loopback no docker compose. Bypass direto ao container e impossivel
# sem SSH no host.

# upstream portifolio_grafana definido em portifolio.conf (vhost principal compartilha o pool com /cliente/metricas).

upstream portifolio_influx {
    server 127.0.0.1:8086;
    keepalive 32;
}

# === grafana.dsplayground.com.br ===
server {
    listen 80;
    listen [::]:80;
    server_name grafana.dsplayground.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name grafana.dsplayground.com.br;

    ssl_certificate     /etc/ssl/cloudflare/dsplayground.com.br/fullchain.pem;
    ssl_certificate_key /etc/ssl/cloudflare/dsplayground.com.br/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    client_max_body_size 25m;
    access_log /var/log/nginx/portifolio.grafana.access.log;
    error_log  /var/log/nginx/portifolio.grafana.error.log warn;

    location / {
        proxy_pass http://portifolio_grafana;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Live dashboards / alerting usam WebSocket
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }
}

# === influx.dsplayground.com.br ===
server {
    listen 80;
    listen [::]:80;
    server_name influx.dsplayground.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name influx.dsplayground.com.br;

    ssl_certificate     /etc/ssl/cloudflare/dsplayground.com.br/fullchain.pem;
    ssl_certificate_key /etc/ssl/cloudflare/dsplayground.com.br/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    # InfluxDB UI permite upload de templates e import de dados
    client_max_body_size 50m;
    access_log /var/log/nginx/portifolio.influx.access.log;
    error_log  /var/log/nginx/portifolio.influx.error.log warn;

    location / {
        proxy_pass http://portifolio_influx;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        # Buffers maiores para responses grandes de query Flux
        proxy_buffers 16 16k;
        proxy_buffer_size 16k;
    }
}
