# Nginx vhost — portifolio analytics (REFERENCIA)
#
# Arquivo REAL em producao e renderizado pela role Ansible `nginx` a partir do
# template `ark/ansible/roles/nginx/templates/portifolio.conf.j2`. Este arquivo
# aqui serve como espelho versionado para revisao — mantenha em sincronia com
# o template (sem o Jinja).
#
# Requisitos:
#   - TLS via Cloudflare Origin Certificate em /etc/ssl/cloudflare-origin/
#     (wildcard *.dsplayground.com.br + apex)
#   - backend Flask+Socket.IO escutando em 127.0.0.1:5000
#   - frontend (portfolio React 3D) em 127.0.0.1:3000
#   - Grafana em 127.0.0.1:3001
#   - APEX `dsplayground.com.br` aponta pra Cloudflare Pages (repo `comercial`)
#     — DNS nao chega aqui. Vhost apex foi removido (era dead code).
#   - Backend seta cookie `cliente_session` com Domain=dsplayground.com.br
#     (env COOKIE_DOMAIN) pra subdominios same-site lerem o mesmo cookie.

limit_req_zone $binary_remote_addr zone=analytics_edge:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=cliente_auth:10m rate=10r/s;

upstream dsplay_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

upstream dsplay_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream dsplay_grafana {
    server 127.0.0.1:3001;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.dsplayground.com.br portifolio.dsplayground.com.br api.dsplayground.com.br embed.dsplayground.com.br;
    return 301 https://$host$request_uri;
}

# ============== app.X: dashboard logado do cliente ==============
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.dsplayground.com.br;

    ssl_certificate     /etc/ssl/cloudflare-origin/fullchain.pem;
    ssl_certificate_key /etc/ssl/cloudflare-origin/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    client_max_body_size 1m;
    access_log /var/log/nginx/dsplay-app.access.log;
    error_log  /var/log/nginx/dsplay-app.error.log warn;

    location = / {
        return 302 /cliente/metricas/;
    }

    location /cliente/metricas/ {
        auth_request /__cliente_auth_gate;
        auth_request_set $cliente_user  $upstream_http_x_webauth_user;
        auth_request_set $cliente_papel $upstream_http_x_webauth_papel;
        error_page 401 = @cliente_nao_autenticado;

        # Permite embedding via iframe a partir do apex (dsplayground.com.br CF Pages).
        # Grafana tem GF_SECURITY_ALLOW_EMBEDDING=true; proxy_hide_header garante
        # que nenhum X-Frame-Options residual chegue ao browser.
        proxy_hide_header X-Frame-Options;
        add_header Content-Security-Policy "frame-ancestors 'self' https://dsplayground.com.br https://*.dsplayground.com.br" always;

        # SEM trailing `/`: preserva path /cliente/metricas/* pro Grafana
        # (que tem GF_SERVER_SERVE_FROM_SUB_PATH=true). Com `/` strippa e gera loop 301.
        proxy_pass http://dsplay_grafana;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-WEBAUTH-USER    $cliente_user;
        proxy_set_header X-WEBAUTH-PAPEL   $cliente_papel;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /__cliente_auth_gate {
        internal;
        proxy_pass http://dsplay_backend/cliente/auth/gate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location @cliente_nao_autenticado {
        return 302 https://dsplayground.com.br/cliente/login;
    }
}

# ============== portifolio.X: portfolio pessoal (React 3D) ==============
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name portifolio.dsplayground.com.br;

    ssl_certificate     /etc/ssl/cloudflare-origin/fullchain.pem;
    ssl_certificate_key /etc/ssl/cloudflare-origin/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    client_max_body_size 1m;
    access_log /var/log/nginx/portifolio.access.log;
    error_log  /var/log/nginx/portifolio.error.log warn;

    location / {
        proxy_pass http://dsplay_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        limit_req zone=analytics_edge burst=40 nodelay;
        proxy_pass http://dsplay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============== embed.X: widget de iframe (Fase 1 dogfood) ==============
# Subdominio dedicado pra widget React isolado. Serve o mesmo bundle do
# portifolio.X (container portifolio-frontend) restrito a /widget/* +
# /assets/*. Substitui X-Frame-Options herdado do ssl.conf por CSP
# frame-ancestors. Auth: JWT na URL, sem cookie. Ver ark/docs/embed-iframe.md.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name embed.dsplayground.com.br;

    ssl_certificate     /etc/ssl/cloudflare-origin/fullchain.pem;
    ssl_certificate_key /etc/ssl/cloudflare-origin/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    client_max_body_size 1m;
    access_log /var/log/nginx/dsplay-embed.access.log;
    error_log  /var/log/nginx/dsplay-embed.error.log warn;

    location = / {
        return 404;
    }

    location /widget/ {
        add_header X-Content-Type-Options "nosniff"                    always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy
            "frame-ancestors 'self' https://*.dsplayground.com.br https://dsplayground.com.br; default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.dsplayground.com.br; img-src 'self' data:; font-src 'self' data:"
            always;

        proxy_pass http://dsplay_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /assets/ {
        add_header X-Content-Type-Options "nosniff"                    always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy
            "frame-ancestors 'self' https://*.dsplayground.com.br https://dsplayground.com.br; default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.dsplayground.com.br; img-src 'self' data:; font-src 'self' data:"
            always;

        proxy_pass http://dsplay_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}

# ============== API: backend Flask + Socket.IO ==============
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.dsplayground.com.br;
    # http2 desligado: nginx 1.20 (Rocky 9) nao suporta WebSocket sobre HTTP/2 (RFC 8441).
    # socket.io abre wss://api/socket.io e o handshake Upgrade so funciona em HTTP/1.1.

    ssl_certificate     /etc/ssl/cloudflare-origin/fullchain.pem;
    ssl_certificate_key /etc/ssl/cloudflare-origin/privkey.pem;
    include             /etc/nginx/snippets/ssl.conf;

    client_max_body_size 1m;
    access_log /var/log/nginx/dsplay-api.access.log;
    error_log  /var/log/nginx/dsplay-api.error.log warn;

    # CSP estrito: a API so retorna JSON, nao deve carregar nada.
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;

    # Bloqueio publico de /metrics — Prometheus scrape acontece DENTRO da rede
    # docker (backend:5000/metrics), nao via nginx. Externamente vaza
    # contadores operacionais (volume por cliente, erros, etc.).
    location = /metrics {
        deny all;
        return 404;
    }

    # Login do dashboard do cliente — rate limit per-IP contra brute force.
    # Defesa em profundidade vs limiter no Flask.
    location = /cliente/auth/login {
        limit_req zone=cliente_auth burst=5 nodelay;
        proxy_pass http://dsplay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /cliente/auth/magic-link/solicitar {
        limit_req zone=cliente_auth burst=3 nodelay;
        proxy_pass http://dsplay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /cliente/auth/cadastro {
        limit_req zone=cliente_auth burst=3 nodelay;
        proxy_pass http://dsplay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /auth/sdk-token {
        limit_req zone=cliente_auth burst=10 nodelay;
        proxy_pass http://dsplay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=analytics_edge burst=40 nodelay;

        proxy_pass http://dsplay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }
}
