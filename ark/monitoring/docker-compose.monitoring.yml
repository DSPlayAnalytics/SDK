services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: dsplay-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - alertmanager
    networks:
      - dsplay-monitoring
      - dsplay-app

  alertmanager:
    image: prom/alertmanager:v0.32.1
    container_name: dsplay-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.listen-address=:9093
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      - ./alertmanager/slack_webhook.url:/etc/alertmanager/slack_webhook.url:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - dsplay-monitoring

  grafana:
    image: grafana/grafana:11.6.14
    container_name: dsplay-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-dev-local-influxdb-token}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-zen}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-portifolio_prod}
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL:-https://app.dsplayground.com.br/cliente/metricas/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: X-WEBAUTH-USER
      GF_AUTH_PROXY_HEADER_PROPERTY: username
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_HEADERS: "Role:X-WEBAUTH-PAPEL"
      GF_AUTH_PROXY_WHITELIST: "127.0.0.1, ::1, 172.16.0.0/12, 10.0.0.0/8"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
      GF_USERS_VIEWERS_CAN_EDIT: "false"
      GF_EXPLORE_ENABLED: "false"
      GF_SNAPSHOTS_EXTERNAL_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    networks:
      - dsplay-monitoring
      - dsplay-app

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: dsplay-node-exporter
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - dsplay-monitoring

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:

networks:
  dsplay-monitoring:
    driver: bridge
  dsplay-app:
    external: true
    name: dsplay_default
