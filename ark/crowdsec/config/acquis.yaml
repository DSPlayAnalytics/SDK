---
# Logs do backend analytics (formato estruturado `evento=... session_id=...`)
filenames:
  - /var/log/backend/security.log
labels:
  type: dsplay-backend
---
# Logs do vhost portifolio.dsplayground.com.br (portfolio pessoal React 3D)
filenames:
  - /var/log/nginx/portifolio.access.log
labels:
  type: nginx
---
filenames:
  - /var/log/nginx/portifolio.error.log
labels:
  type: nginx-error
---
# Logs do vhost api.dsplayground.com.br
filenames:
  - /var/log/nginx/dsplay-api.access.log
labels:
  type: nginx
---
filenames:
  - /var/log/nginx/dsplay-api.error.log
labels:
  type: nginx-error
---
# Logs do vhost app.dsplayground.com.br (dashboard logado)
filenames:
  - /var/log/nginx/dsplay-app.access.log
labels:
  type: nginx
---
filenames:
  - /var/log/nginx/dsplay-app.error.log
labels:
  type: nginx-error
---
# Logs do vhost embed.dsplayground.com.br (widget iframe)
filenames:
  - /var/log/nginx/dsplay-embed.access.log
labels:
  type: nginx
---
filenames:
  - /var/log/nginx/dsplay-embed.error.log
labels:
  type: nginx-error
