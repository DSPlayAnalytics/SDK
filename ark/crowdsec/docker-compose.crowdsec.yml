services:
  crowdsec:
    image: crowdsecurity/crowdsec:v1.6.11
    container_name: dsplay-crowdsec
    restart: unless-stopped
    environment:
      COLLECTIONS: "crowdsecurity/http-cve crowdsecurity/linux crowdsecurity/nginx"
      CUSTOM_HOSTNAME: dsplay-crowdsec
    volumes:
      - ./config/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - ./parsers/backend-analytics.yaml:/etc/crowdsec/parsers/s01-parse/backend-analytics.yaml:ro
      - ./scenarios/admin-auth-abuse.yaml:/etc/crowdsec/scenarios/admin-auth-abuse.yaml:ro
      - ./scenarios/analytics-flood.yaml:/etc/crowdsec/scenarios/analytics-flood.yaml:ro
      - /var/log/nginx:/var/log/nginx:ro
      - ../../backend/security.log:/var/log/backend/security.log:ro
      - crowdsec-db:/var/lib/crowdsec/data
      - crowdsec-config:/etc/crowdsec
    ports:
      - "127.0.0.1:6060:6060"
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "cscli", "lapi", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dsplay-app

volumes:
  crowdsec-db:
  crowdsec-config:

networks:
  dsplay-app:
    external: true
    name: dsplay_default
